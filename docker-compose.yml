services:
  postgres:
    image: postgres:16-alpine
    container_name: pva_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pva
      POSTGRES_PASSWORD: pva_dev_password
      POSTGRES_DB: pracevautoskole
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pva -d pracevautoskole"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: pva_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pva_minio
      MINIO_ROOT_PASSWORD: pva_minio_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
